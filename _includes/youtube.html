{% assign youtube_id = include.id | default: include.video_id %}
{% assign youtube_title = include.title | default: 'YouTube video' %}

{% if youtube_id %}
  <div class="youtube-embed">
    <iframe
      src="https://www.youtube-nocookie.com/embed/{{ youtube_id | uri_escape }}"
      title="{{ youtube_title | escape }}"
      loading="lazy"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  </div>

  <style>
    .youtube-embed {
      position: relative;
      width: 100%;
      max-width: 100%;
      margin: 1.5rem 0;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      border-radius: 8px;
      background: #111217;
    }

    .youtube-embed iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
{% endif %}
